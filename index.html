<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>md-browser</title>
    <link rel="stylesheet" href="/src/styles/base.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <button id="hamburger-menu-btn" class="icon-btn" title="메뉴"></button>
          <span class="sidebar-title"></span>
          <button id="sidebar-close-btn" class="icon-btn" title="사이드바 닫기"></button>
        </div>
        <div id="file-tree" class="file-tree">
          <div id="file-tree-empty" class="file-tree-empty">
            <p>열린 폴더가 없습니다</p>
            <button id="open-folder-empty-btn" class="open-folder-btn">폴더 열기</button>
          </div>
        </div>
      </aside>
      <div id="sidebar-resize" class="resize-handle"></div>
      <main class="main-area">
        <div class="toolbar">
          <button id="sidebar-open-btn" class="icon-btn hidden" title="사이드바 열기"></button>
          <div id="tab-bar" class="tab-bar"></div>
          <button id="raw-toggle-btn" class="icon-btn" title="Raw 마크다운 보기"></button>
          <button id="toc-open-btn" class="icon-btn hidden" title="목차 열기"></button>
        </div>
        <div id="search-bar" class="search-bar hidden"></div>
        <div id="editor-container" class="editor-container"></div>
        <textarea id="raw-editor" class="raw-editor hidden" spellcheck="false"></textarea>
      </main>
      <div id="toc-resize" class="resize-handle"></div>
      <aside id="toc-panel" class="toc-panel">
        <div class="toc-header">
          <span class="toc-title">목차</span>
          <button id="toc-toggle-btn" class="icon-btn" title="목차 닫기"></button>
        </div>
        <div id="toc-content" class="toc-content"></div>
      </aside>
    </div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
